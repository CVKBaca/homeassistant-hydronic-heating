blueprint:
  name: Hydronic Boiler - Turn OFF
  description: >
    Vypne kotol keď všetky termostatové senzory sú 'off' po dobu
    turn_off_delay minút. Delay je priamo v triggeri — kotol sa vypne
    okamžite po uplynutí čakacej doby bez zbytočného pumpovania vody.
    Určené pre použitie spolu s blueprintom Hydronic Boiler - Turn ON.

    DÔLEŽITÉ: Hydraulický okruh musí mať aspoň jeden trvale otvorený radiátor.
    Ak by boli všetky radiátory zatvorené, kotol/čerpadlo by tlačili vodu
    do uzavretého okruhu — riziko poškodenia zariadenia.
  domain: automation
  input:
    boiler_switch:
      name: Switch kotla
      description: "Switch entita ovládajúca kotol (napr. switch.protherm_tiger_24)"
      selector:
        entity:
          domain: switch
    thermostat_sensors:
      name: Termostatové senzory
      description: "Zoznam binary senzorov — každý reprezentuje jednu miestnosť/zónu (napr. binary_sensor.thermostat_living_room). Senzor by mal byť 'on' keď miestnosť vyžaduje kúrenie."
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    turn_off_delay:
      name: Oneskorenie vypnutia (minúty)
      description: "Počet minút počas ktorých musia byť všetky termostaty 'off' pred vypnutím kotla."
      default: 10
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: min
          mode: box

variables:
  boiler_switch: !input boiler_switch
  thermostat_sensors: !input thermostat_sensors

triggers:
  - entity_id: !input thermostat_sensors
    to: 'off'
    for:
      minutes: !input turn_off_delay
    trigger: state
  - minutes: /15
    trigger: time_pattern

conditions:
  - condition: template
    value_template: >
      {{ thermostat_sensors | map('states') | reject('equalto', 'off') | list | count == 0
         and states(boiler_switch) == 'on' }}

actions:
  - repeat:
      sequence:
      - action: homeassistant.turn_off
        target:
          entity_id: !input boiler_switch
      - delay:
          seconds: 10
      until:
      - condition: template
        value_template: "{{ states(boiler_switch) == 'off' }}"

mode: single
