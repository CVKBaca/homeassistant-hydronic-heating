blueprint:
  name: Shelly TRV - Sync External Temperature
  description: >
    Synchronizuje teplotu z externého Aqara senzora na Shelly TRV cez MQTT
    (ext_t príkaz). Beží len keď je ventil otvorený a kúrenie je aktívne.
    Ochrana pred častými zmenami TRV senzora — ak sa TRV senzor menil v
    posledných 5 minútach a rozdiel je > 0.04°C, počká na stabilizáciu.
  domain: automation
  input:
    aqara_sensor:
      name: Aqara teplotný senzor
      description: "Externý teplotný senzor v miestnosti (napr. sensor.aqara_t1_sensor_bedroom_temperature)"
      selector:
        entity:
          domain: sensor
          device_class: temperature
    trv_temperature_sensor:
      name: TRV interný teplotný senzor
      description: "Vlastný senzor Shelly TRV (napr. sensor.shelly_trv_bedroom_1_temperature)"
      selector:
        entity:
          domain: sensor
          device_class: temperature
    valve_position_sensor:
      name: Senzor požadovanej pozície ventilu
      description: "UI template senzor s požadovanou pozíciou (napr. sensor.valve_position_bedroom_1)"
      selector:
        entity:
          domain: sensor
    mqtt_topic:
      name: MQTT topic pre ext_t
      description: "Napr. shellies/shellytrv_bedroom_1/thermostat/0/command/ext_t"
      selector:
        text: {}
    heating_status_sensor:
      name: Senzor stavu kúrenia
      description: "Senzor ktorý vracia 'On'/'Off' (napr. sensor.heating_status)"
      default: sensor.heating_status
      selector:
        entity:
          domain: sensor

variables:
  aqara_sensor: !input aqara_sensor
  trv_temperature_sensor: !input trv_temperature_sensor
  valve_position_sensor: !input valve_position_sensor
  mqtt_topic: !input mqtt_topic
  heating_status_sensor: !input heating_status_sensor

triggers:
  - entity_id: !input aqara_sensor
    trigger: state

conditions:
  - condition: numeric_state
    entity_id: !input valve_position_sensor
    above: 0
  - condition: template
    value_template: "{{ states(heating_status_sensor) == 'On' }}"

actions:
  - if:
    - condition: template
      value_template: >
        {{ as_timestamp(now()) - as_timestamp(states[trv_temperature_sensor].last_changed) < 300
           and (((states(aqara_sensor) | round(2)) - (states(trv_temperature_sensor) | round(2)) > 0.04)
                or ((states(aqara_sensor) | round(2)) - (states(trv_temperature_sensor) | round(2)) < -0.04)) }}
    then:
      - wait_template: >
          {{ as_timestamp(now()) - as_timestamp(states[trv_temperature_sensor].last_changed) > 300 }}
        continue_on_timeout: true
        timeout: '300'
      - data:
          topic: !input mqtt_topic
          qos: '2'
          payload: '{{ states(aqara_sensor) }}'
        action: mqtt.publish
    else:
      - data:
          topic: !input mqtt_topic
          qos: '2'
          payload: '{{ states(aqara_sensor) }}'
        action: mqtt.publish

mode: single
