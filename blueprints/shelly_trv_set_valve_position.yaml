blueprint:
  name: Shelly TRV - Set Valve Position
  description: >
    Nastavuje pozíciu ventilu Shelly TRV na základe teplotnej delty
    (climate target_t − Aqara externý senzor). Proporcionálna lookup tabuľka
    delta→pozícia, hysteréza ≥5%, ochrana pred krátkym cyklovaním kotla,
    retry MQTT loop. Parametrizovaný senzor kúrenia a senzor kotla.
  domain: automation
  input:
    trv_entity:
      name: TRV Climate entita
      description: "Climate entita Shelly TRV (napr. climate.shelly_trv_bedroom_1)"
      selector:
        entity:
          domain: climate
    valve_position_sensor:
      name: Senzor požadovanej pozície ventilu
      description: "UI template senzor s požadovanou pozíciou (napr. sensor.valve_position_bedroom_1)"
      selector:
        entity:
          domain: sensor
    current_valve_entity:
      name: Aktuálna pozícia ventilu
      description: "Number entita s aktuálnou pozíciou (napr. number.shelly_trv_bedroom_1_valve_position)"
      selector:
        entity:
          domain: number
    aqara_sensor:
      name: Aqara teplotný senzor
      description: "Externý teplotný senzor v miestnosti (napr. sensor.aqara_t1_sensor_bedroom_temperature)"
      selector:
        entity:
          domain: sensor
          device_class: temperature
    mqtt_topic:
      name: MQTT topic pre valve_pos
      description: "Napr. shellies/shellytrv_bedroom_1/thermostat/0/command/valve_pos"
      selector:
        text: {}
    heating_status_sensor:
      name: Senzor stavu kúrenia
      description: "Senzor ktorý vracia 'On'/'Off' (napr. sensor.heating_status)"
      default: sensor.heating_status
      selector:
        entity:
          domain: sensor
    boiler_sensor:
      name: Senzor kotla (binary)
      description: "Binary sensor kotla pre ochranu pred krátkym cyklovaním (napr. binary_sensor.protherm_24)"
      default: binary_sensor.protherm_24
      selector:
        entity:
          domain: binary_sensor

variables:
  trv_entity: !input trv_entity
  valve_position_sensor: !input valve_position_sensor
  current_valve_entity: !input current_valve_entity
  aqara_sensor: !input aqara_sensor
  mqtt_topic: !input mqtt_topic
  heating_status_sensor: !input heating_status_sensor
  boiler_sensor: !input boiler_sensor

triggers:
  - entity_id: !input valve_position_sensor
    trigger: state
  - entity_id: !input aqara_sensor
    trigger: state

conditions:
  - condition: template
    value_template: >
      {{ ((states(current_valve_entity) | int(0) - states(valve_position_sensor) | int(0)) | abs >= 5
          and states(heating_status_sensor) == 'On')
         or (states(heating_status_sensor) == 'Off'
             and states(current_valve_entity) | int(0) > 0) }}

actions:
  - if:
    - condition: template
      value_template: >
        {% set delta = state_attr(trv_entity, 'temperature') | float(0) - states(aqara_sensor) | float(25) %}
        {% if delta <= -0.1 %}{% set positionx = 0 %}
        {% elif delta <= -0.05 %}{% set positionx = 13 %}
        {% elif delta <= 0 %}{% set positionx = 18 %}
        {% elif delta <= 0.05 %}{% set positionx = 25 %}
        {% elif delta <= 0.1 %}{% set positionx = 33 %}
        {% elif delta <= 0.15 %}{% set positionx = 40 %}
        {% elif delta <= 0.2 %}{% set positionx = 48 %}
        {% elif delta <= 0.25 %}{% set positionx = 55 %}
        {% elif delta <= 0.3 %}{% set positionx = 63 %}
        {% elif delta <= 0.35 %}{% set positionx = 70 %}
        {% elif delta <= 0.4 %}{% set positionx = 78 %}
        {% elif delta <= 0.45 %}{% set positionx = 85 %}
        {% elif delta <= 0.5 %}{% set positionx = 93 %}
        {% else %}{% set positionx = 100 %}
        {% endif %}
        {{ (positionx <= 18 and states(boiler_sensor) == "on"
            and as_timestamp(now()) - as_timestamp(states[boiler_sensor].last_changed) < 600)
           or (positionx > 18 and states(boiler_sensor) == "off"
               and as_timestamp(now()) - as_timestamp(states[boiler_sensor].last_changed) < 600) }}
    then:
      - wait_template: >
          {{ as_timestamp(now()) - as_timestamp(states[boiler_sensor].last_changed) > 600 }}
        continue_on_timeout: false
        timeout: '1000'
      - if:
        - condition: template
          value_template: >
            {% set delta = state_attr(trv_entity, 'temperature') | float(0) - states(aqara_sensor) | float(25) %}
            {% if delta <= -0.1 %}{% set positionx = 0 %}
            {% elif delta <= -0.05 %}{% set positionx = 13 %}
            {% elif delta <= 0 %}{% set positionx = 18 %}
            {% elif delta <= 0.05 %}{% set positionx = 25 %}
            {% elif delta <= 0.1 %}{% set positionx = 33 %}
            {% elif delta <= 0.15 %}{% set positionx = 40 %}
            {% elif delta <= 0.2 %}{% set positionx = 48 %}
            {% elif delta <= 0.25 %}{% set positionx = 55 %}
            {% elif delta <= 0.3 %}{% set positionx = 63 %}
            {% elif delta <= 0.35 %}{% set positionx = 70 %}
            {% elif delta <= 0.4 %}{% set positionx = 78 %}
            {% elif delta <= 0.45 %}{% set positionx = 85 %}
            {% elif delta <= 0.5 %}{% set positionx = 93 %}
            {% else %}{% set positionx = 100 %}
            {% endif %}
            {{ positionx != states(current_valve_entity) | round(0) and states(heating_status_sensor) == "On" }}
        then:
          - repeat:
              sequence:
                - data:
                    qos: '2'
                    topic: !input mqtt_topic
                    payload: '{{ states(valve_position_sensor) }}'
                  action: mqtt.publish
                - delay:
                    hours: 0
                    minutes: 0
                    seconds: 5
                    milliseconds: 0
              until:
                - condition: template
                  value_template: >
                    {{ states(current_valve_entity) | round(0) == states(valve_position_sensor) | int() }}
        else:
          - if:
            - condition: template
              value_template: >
                {{ states(current_valve_entity) | int(0) > 0 and states(heating_status_sensor) == "Off" }}
            then:
              - repeat:
                  sequence:
                    - data:
                        qos: '2'
                        topic: !input mqtt_topic
                        payload: '0'
                      action: mqtt.publish
                    - delay:
                        hours: 0
                        minutes: 0
                        seconds: 5
                        milliseconds: 0
                  until:
                    - condition: template
                      value_template: >
                        {{ states(current_valve_entity) | int(0) == 0 }}
    else:
      - if:
        - condition: template
          value_template: >
            {% set delta = state_attr(trv_entity, 'temperature') | float(0) - states(aqara_sensor) | float(25) %}
            {% if delta <= -0.1 %}{% set positionx = 0 %}
            {% elif delta <= -0.05 %}{% set positionx = 13 %}
            {% elif delta <= 0 %}{% set positionx = 18 %}
            {% elif delta <= 0.05 %}{% set positionx = 25 %}
            {% elif delta <= 0.1 %}{% set positionx = 33 %}
            {% elif delta <= 0.15 %}{% set positionx = 40 %}
            {% elif delta <= 0.2 %}{% set positionx = 48 %}
            {% elif delta <= 0.25 %}{% set positionx = 55 %}
            {% elif delta <= 0.3 %}{% set positionx = 63 %}
            {% elif delta <= 0.35 %}{% set positionx = 70 %}
            {% elif delta <= 0.4 %}{% set positionx = 78 %}
            {% elif delta <= 0.45 %}{% set positionx = 85 %}
            {% elif delta <= 0.5 %}{% set positionx = 93 %}
            {% else %}{% set positionx = 100 %}
            {% endif %}
            {{ positionx != states(current_valve_entity) | round(0) and states(heating_status_sensor) == "On" }}
        then:
          - wait_template: >
              {{ as_timestamp(now()) - as_timestamp(states[boiler_sensor].last_changed) > 600 }}
            continue_on_timeout: false
            timeout: '1000'
          - repeat:
              sequence:
                - data:
                    qos: '2'
                    topic: !input mqtt_topic
                    payload: '{{ states(valve_position_sensor) }}'
                  action: mqtt.publish
                - delay:
                    hours: 0
                    minutes: 0
                    seconds: 5
                    milliseconds: 0
              until:
                - condition: template
                  value_template: >
                    {{ states(current_valve_entity) | round(0) == states(valve_position_sensor) | int() }}
        else:
          - if:
            - condition: template
              value_template: >
                {{ states(current_valve_entity) | int(0) > 0 and states(heating_status_sensor) == "Off" }}
            then:
              - repeat:
                  sequence:
                    - data:
                        qos: '2'
                        topic: !input mqtt_topic
                        payload: '0'
                      action: mqtt.publish
                    - delay:
                        hours: 0
                        minutes: 0
                        seconds: 5
                        milliseconds: 0
                  until:
                    - condition: template
                      value_template: >
                        {{ states(current_valve_entity) | int(0) == 0 }}

mode: single
