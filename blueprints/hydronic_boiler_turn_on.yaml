blueprint:
  name: Hydronic Boiler - Turn ON
  description: >
    Zapne kotol keď aspoň jeden termostatový senzor vyžaduje kúrenie.
    Ochrana pred short-cyclingom: čaká kým kotol nebol zmenený dlhšie
    ako min_cycle_protection sekúnd. Určené pre použitie spolu s blueprintom
    Hydronic Boiler - Turn OFF.

    DÔLEŽITÉ: Hydraulický okruh musí mať aspoň jeden trvale otvorený radiátor.
    Ak by boli všetky radiátory zatvorené, kotol/čerpadlo by tlačili vodu
    do uzavretého okruhu — riziko poškodenia zariadenia.
  domain: automation
  input:
    boiler_switch:
      name: Switch kotla
      description: "Switch entita ovládajúca kotol (napr. switch.protherm_tiger_24)"
      selector:
        entity:
          domain: switch
    boiler_sensor:
      name: Binary sensor kotla
      description: "Binary sensor sledujúci skutočný stav kotla — používa sa na ochranu pred short-cyclingom (napr. binary_sensor.protherm_24)"
      selector:
        entity:
          domain: binary_sensor
    heating_status_sensor:
      name: Senzor stavu kúrenia
      description: "Senzor vracajúci 'On' keď je kúrenie aktívne (napr. sensor.heating_status)"
      default: sensor.heating_status
      selector:
        entity:
          domain: sensor
    thermostat_sensors:
      name: Termostatové senzory
      description: "Zoznam binary senzorov — každý reprezentuje jednu miestnosť/zónu (napr. binary_sensor.thermostat_living_room). Senzor by mal byť 'on' keď miestnosť vyžaduje kúrenie."
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    min_cycle_protection:
      name: Ochrana pred short-cyclingom (minúty)
      description: "Minimálny čas (v minútach) od poslednej zmeny stavu kotla pred zapnutím. Chráni kotol pred krátkym cyklovaním."
      default: 10
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: min
          mode: box

variables:
  boiler_switch: !input boiler_switch
  boiler_sensor: !input boiler_sensor
  heating_status_sensor: !input heating_status_sensor
  thermostat_sensors: !input thermostat_sensors
  min_cycle_protection: !input min_cycle_protection

triggers:
  - entity_id: !input thermostat_sensors
    to: 'on'
    trigger: state
  - minutes: /15
    trigger: time_pattern

conditions:
  - condition: template
    value_template: >
      {{ thermostat_sensors | map('states') | select('equalto', 'on') | list | count > 0
         and states(boiler_switch) == 'off'
         and states(heating_status_sensor) == 'On' }}

actions:
  - repeat:
      sequence:
      - wait_template: >
          {{ as_timestamp(now()) - as_timestamp(states[boiler_sensor].last_changed) > min_cycle_protection * 60 }}
        continue_on_timeout: false
        timeout: '{{ min_cycle_protection * 60 + 60 }}'
      - action: homeassistant.turn_on
        target:
          entity_id: !input boiler_switch
      until:
      - condition: template
        value_template: "{{ states(boiler_switch) == 'on' }}"
  - delay:
      seconds: 10

mode: single
